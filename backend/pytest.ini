[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    characterization: test pins current (possibly buggy) behavior pre-refactor
    integration: hits real database
    unit: isolated, no DB
    slow: takes > 1s
filterwarnings =
    ignore::DeprecationWarning:flask_sqlalchemy.*
    ignore::DeprecationWarning:sqlalchemy.*
